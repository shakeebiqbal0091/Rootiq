# .gitlab-ci.yml — Sample monitored pipeline for DevOps Intelligence Agent
#
# The notify-agent-on-failure job fires on any pipeline failure and sends
# the full event payload to the agent webhook, triggering automated analysis.
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   DEVOPS_AGENT_WEBHOOK_URL   e.g. https://your-agent.example.com
#   DEVOPS_AGENT_WEBHOOK_TOKEN matches GITLAB_WEBHOOK_SECRET in agent .env

stages:
  - lint
  - test
  - build
  - deploy

# ── Lint ────────────────────────────────────────────────────────────────────
lint:
  stage: lint
  image: node:22-alpine
  script:
    - npm ci
    - npm run lint --if-present
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# ── Test ────────────────────────────────────────────────────────────────────
test:
  stage: test
  image: node:22-alpine
  services:
    - mongo:7.0
    - docker.elastic.co/elasticsearch/elasticsearch:8.13.0
  variables:
    MONGODB_URI: "mongodb://mongo/devops_agent_test"
    ELASTIC_URL: "http://docker.elastic.co__elasticsearch__elasticsearch:9200"
    discovery.type: "single-node"
    xpack.security.enabled: "false"
  script:
    - npm ci
    - npm test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

# ── Build ───────────────────────────────────────────────────────────────────
build:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  script:
    - docker build -t devops-intelligence-agent:$CI_COMMIT_SHORT_SHA .
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'

# ── Deploy (manual, version tags only) ─────────────────────────────────────
deploy:
  stage: deploy
  image: google/cloud-sdk:alpine
  script:
    - gcloud run deploy devops-intelligence-agent
        --image gcr.io/$GOOGLE_CLOUD_PROJECT/devops-intelligence-agent:$CI_COMMIT_SHORT_SHA
        --region $GOOGLE_CLOUD_LOCATION
        --platform managed
        --allow-unauthenticated
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      when: manual

# ── Notify agent on any failure (.post always runs last) ───────────────────
notify-agent-on-failure:
  stage: .post
  image: alpine:latest
  when: on_failure
  script:
    - apk add --no-cache curl
    - |
      curl -s -o /dev/null -w "%{http_code}" \
        -X POST "$DEVOPS_AGENT_WEBHOOK_URL/webhook/gitlab" \
        -H "Content-Type: application/json" \
        -H "X-Gitlab-Token: $DEVOPS_AGENT_WEBHOOK_TOKEN" \
        -d "{
          \"object_kind\": \"pipeline\",
          \"object_attributes\": {
            \"id\":     $CI_PIPELINE_ID,
            \"status\": \"failed\",
            \"ref\":    \"$CI_COMMIT_REF_NAME\",
            \"sha\":    \"$CI_COMMIT_SHA\",
            \"url\":    \"$CI_PIPELINE_URL\"
          },
          \"project\": {
            \"id\":      $CI_PROJECT_ID,
            \"name\":    \"$CI_PROJECT_NAME\",
            \"web_url\": \"$CI_PROJECT_URL\"
          },
          \"user\": {
            \"name\": \"$GITLAB_USER_NAME\"
          }
        }"
  rules:
    - if: '$DEVOPS_AGENT_WEBHOOK_URL'
      when: on_failure