# ═══════════════════════════════════════════════════════════════════════════════
# .gitlab-ci.yml — Sample pipeline for the DevOps Intelligence Agent to monitor
#
# When this pipeline fails, it fires a webhook to the agent which:
#   1. Queries Elastic for error logs
#   2. Looks up similar incidents in MongoDB
#   3. Fetches Jira/PagerDuty/DB context via Fivetran
#   4. Synthesizes root cause with Gemini
#   5. Opens a GitLab issue with fix suggestion
#   6. Logs trace to Arize
# ═══════════════════════════════════════════════════════════════════════════════

image: node:22-alpine

variables:
  NODE_ENV: test
  # Forward pipeline logs to Elasticsearch for the agent to search
  LOG_COLLECTOR_URL: ${ELASTIC_URL}/pipeline-logs-${CI_PROJECT_ID}/_doc
  AGENT_WEBHOOK_URL: ${DEVOPS_AGENT_WEBHOOK_URL}

stages:
  - lint
  - test
  - build
  - deploy

# ── Cache ─────────────────────────────────────────────────────────────────────
.node_cache: &node_cache
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
    policy: pull-push

# ── Lint ──────────────────────────────────────────────────────────────────────
lint:
  stage: lint
  <<: *node_cache
  script:
    - npm ci
    - npm run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Unit tests ────────────────────────────────────────────────────────────────
unit-tests:
  stage: test
  <<: *node_cache
  script:
    - npm ci
    - npm test -- --reporter=junit --outputFile=test-results/unit.xml
  artifacts:
    when: always
    reports:
      junit: test-results/unit.xml
    expire_in: 7 days
  coverage: '/Lines\s*:\s*(\d+\.?\d*)%/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH

# ── Integration tests ─────────────────────────────────────────────────────────
integration-tests:
  stage: test
  <<: *node_cache
  services:
    - name: mongo:7.0
      alias: mongo
    - name: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
      alias: elasticsearch
      variables:
        discovery.type: single-node
        xpack.security.enabled: "false"
  variables:
    MONGODB_URI: mongodb://mongo:27017/test
    ELASTIC_URL: http://elasticsearch:9200
  script:
    - npm ci
    - node scripts/test-integrations.js
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\//

# ── Build Docker image ────────────────────────────────────────────────────────
build-image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $IMAGE_TAG .
    - docker tag $IMAGE_TAG $CI_REGISTRY_IMAGE:latest
    - docker push $IMAGE_TAG
    - docker push $CI_REGISTRY_IMAGE:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Deploy to staging ─────────────────────────────────────────────────────────
deploy-staging:
  stage: deploy
  image: google/cloud-sdk:alpine
  environment:
    name: staging
    url: https://staging.devops-agent.example.com
  script:
    - gcloud auth activate-service-account --key-file=$GCP_SERVICE_KEY
    - gcloud run deploy devops-agent-staging
        --image $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
        --region us-central1
        --platform managed
        --set-env-vars "NODE_ENV=staging"
        --no-traffic
    - gcloud run services update-traffic devops-agent-staging
        --to-revisions LATEST=100
        --region us-central1
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Deploy to production ──────────────────────────────────────────────────────
deploy-production:
  stage: deploy
  image: google/cloud-sdk:alpine
  environment:
    name: production
    url: https://devops-agent.example.com
  script:
    - gcloud auth activate-service-account --key-file=$GCP_SERVICE_KEY
    - gcloud run deploy devops-agent
        --image $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
        --region us-central1
        --platform managed
    - echo "Deployed $CI_COMMIT_SHORT_SHA to production"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
  when: manual

# ── Notify agent on failure ───────────────────────────────────────────────────
# This fires even when the above jobs fail, waking up the agent
notify-agent-on-failure:
  stage: .post
  image: curlimages/curl:latest
  script:
    - |
      curl -s -X POST "${AGENT_WEBHOOK_URL}/webhook/gitlab" \
        -H "Content-Type: application/json" \
        -H "X-Gitlab-Token: ${DEVOPS_AGENT_WEBHOOK_SECRET}" \
        -H "X-Gitlab-Event: Pipeline Hook" \
        -d "{
          \"object_kind\": \"pipeline\",
          \"object_attributes\": {
            \"id\": ${CI_PIPELINE_ID},
            \"ref\": \"${CI_COMMIT_REF_NAME}\",
            \"sha\": \"${CI_COMMIT_SHA}\",
            \"status\": \"failed\",
            \"duration\": ${CI_PIPELINE_DURATION:-0}
          },
          \"project\": {
            \"id\": ${CI_PROJECT_ID},
            \"name\": \"${CI_PROJECT_NAME}\",
            \"web_url\": \"${CI_PROJECT_URL}\"
          }
        }"
  rules:
    - when: on_failure
