# docker-compose.yml — DevOps Intelligence Agent full stack
#
# Usage:
#   docker-compose up --build              # core stack
#   docker-compose --profile observability up --build  # + Kibana + Mongo Express
#
# The agent degrades gracefully if Elastic/Mongo take time to start.
# All credentials come from .env — copy .env.example to .env first.

services:

  # ── Elasticsearch ───────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Agent (webhook server) ──────────────────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "${WEBHOOK_PORT:-3000}:3000"
    env_file: .env
    environment:
      - MONGODB_URI=mongodb://mongo:27017/devops_agent
      - ELASTIC_URL=http://elasticsearch:9200
      - NODE_ENV=production
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      elasticsearch:
        condition: service_healthy
      mongo:
        condition: service_healthy
    volumes:
      # Hot-reload in dev: mount agent/ and tools/ as read-only
      - ./agent:/app/agent:ro
      - ./tools:/app/tools:ro
    restart: unless-stopped

  # ── Dashboard ───────────────────────────────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - agent
    restart: unless-stopped

  # ── Kibana (optional — run with --profile observability) ────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.0
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      elasticsearch:
        condition: service_healthy
    profiles:
      - observability

  # ── Mongo Express (optional — run with --profile observability) ─────────────
  mongo-express:
    image: mongo-express:latest
    ports:
      - "8081:8081"
    environment:
      - ME_CONFIG_MONGODB_SERVER=mongo
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      mongo:
        condition: service_healthy
    profiles:
      - observability

volumes:
  es_data:
  mongo_data: